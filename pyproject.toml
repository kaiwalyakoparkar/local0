[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
# Pyflakes + pycodestyle + isort + bugbear. Keep it boring.
select = ["E", "F", "I", "B"]
ignore = ["E501"]  # long lines are caught by review, not worth failing CI

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
