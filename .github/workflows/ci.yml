name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Test
        env:
          STARTUP_TIMEOUT: "0"   # skip the dependency-wait gate in CI (no live Ollama/Qdrant)
        run: pytest
      - name: Audit dependencies
        run: pip-audit -r requirements.txt || true   # advisory until pins are triaged
